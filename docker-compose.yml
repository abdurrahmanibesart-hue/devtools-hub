version: '3.9'

services:
  app:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/devtools
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:7
    volumes:
      - mongodata:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"

volumes:
  mongodata:
