version: '3.9'

services:
  app:
    build:
      context: .
      target: backend-builder
    command: npm run start:dev
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./src:/app/src
    environment:
      - MONGO_URI=mongodb://mongodb:27017/devtools
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
